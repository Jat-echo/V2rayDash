#==========================================
# V2rayDash 环境配置文件
# 请根据实际情况修改以下配置
#==========================================

# 域名配置
DOMAIN="your-domain.com"
ADMIN_EMAIL="admin@your-domain.com"

# 应用目录
APP_DIR="/opt/v2ray-dash"
DATA_DIR="/var/lib/v2ray-dash"

# 数据库配置
DB_NAME="v2ray_dash"
DB_USER="v2ray_dash"
DB_PASSWORD="your-strong-password-here"
DB_URL="postgres://$DB_USER:$DB_PASSWORD@localhost:5432/$DB_NAME?sslmode=disable"

# 端口配置
BACKEND_PORT="8080"

# 软件版本
GO_VERSION="go1.22.0"
NODE_VERSION="18.x"

# Git 配置（如果使用 git 部署）
USE_GIT="true"
GIT_REPO="https://github.com/Jat-echo/V2rayDash.git"

# SSL 配置
USE_SSL="false"